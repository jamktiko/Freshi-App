name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests & Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        
    - name: Install Dependencies
      working-directory: ./backend
      run: npm install

    - name: Sanity Check - Verify All Imports Resolve
      working-directory: ./backend
      run: |
        timeout 10 node --input-type=module -e "await import('./app.js')" 2>&1
        EXIT_CODE=$?
        if [ $EXIT_CODE -eq 124 ]; then
          echo "✅ App started successfully - all imports resolved"
          exit 0
        elif [ $EXIT_CODE -eq 0 ]; then
          echo "✅ App exited cleanly"
          exit 0
        else
          echo "::error::App failed to start - missing dependencies or broken imports!"
          exit 1
        fi
        
    - name: Run Unit Tests (Mocked)
      working-directory: ./backend
      run: npm test
