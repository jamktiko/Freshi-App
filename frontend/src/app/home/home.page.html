<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Freshi</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="summary-card-list">
    <app-summary-card
      icon="checkmark-circle-outline"
      amount="5"
      freshness="Fresh"
    ></app-summary-card>
    <app-summary-card
      icon="time-outline"
      amount="2"
      freshness="Expiring"
    ></app-summary-card>
    <app-summary-card
      icon="alert-circle-outline"
      amount="1"
      freshness="Expired"
    ></app-summary-card>
  </div>
  <ion-searchbar placeholder="Search products"></ion-searchbar>

  <div class="product-list">
    <div class="product-list-header">
      <h3>
        <b>Your items</b>
        <span class="product-list-subtitle">
          {{productList().length}} items</span
        >
      </h3>
      <ion-button>Filters</ion-button>
    </div>
    @for (product of productList(); track product.ItemId) {
    <app-product-card [product]="product"></app-product-card>
    }
  </div>
</ion-content>
