<ion-header class="ion-no-border">
  <ion-toolbar>
    <b>Add item</b>

    <ion-buttons class="back" slot="start">
      <ion-button (click)="cancel()"
        ><ion-icon name="arrow-back"></ion-icon
      ></ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <form [formGroup]="productForm">
    <ion-list class="addproduct">
      <ion-item lines="none" class="field-row">
        <ion-input
          class="freshi-input"
          id="name"
          [formControl]="productForm.controls.name"
          label="Product Name"
          labelPlacement="stacked"
          fill="outline"
          placeholder="e.g., Organic Strawberries"
        ></ion-input>
      </ion-item>

      <ion-item lines="none" class="field-row">
        <ion-input
          class="freshi-input"
          label="Brand"
          [formControl]="productForm.controls.brand"
          labelPlacement="stacked"
          fill="outline"
          placeholder="e.g., Fresh Farms"
        ></ion-input>
      </ion-item>

      <ion-item lines="none" class="field-row">
        <ion-input
          class="freshi-input"
          label="Category"
          [formControl]="productForm.controls.category"
          labelPlacement="stacked"
          fill="outline"
          placeholder="e.g., Fruit, Dairy"
        ></ion-input>
      </ion-item>
      <ion-item lines="none" class="field-row">
        <ion-input
          class="freshi-input"
          type="date"
          label="Expiration date"
          [formControl]="productForm.controls.expiration"
          labelPlacement="stacked"
          fill="outline"
          placeholder="t"
        ></ion-input>
      </ion-item>

      <ion-button (click)="submitProduct()" [disabled]="productForm.invalid">
        Add item
      </ion-button>
    </ion-list>
  </form>
</ion-content>
