<ion-header [translucent]="true">
  <ion-toolbar>
    <div class="registrationheader">
      <p>Sign up for Freshi!</p>
      <h1>Create an account to make the most of your food!</h1>
    </div>
  </ion-toolbar>
</ion-header>

<form [formGroup]="registration">
  <ion-list>
    <ion-item lines="none" class="field-row">
      <ion-input
        class="freshi-input"
        type="email"
        id="email"
        [formControl]="registration.controls.email"
        label="Email"
        labelPlacement="stacked"
        fill="outline"
        placeholder="Enter email"
      ></ion-input>
    </ion-item>

    <ion-item lines="none" class="field-row">
      <ion-input
        class="freshi-input"
        type="password"
        label="Password"
        [formControl]="registration.controls.passwordsGroup.controls.password"
        labelPlacement="stacked"
        fill="outline"
        placeholder="Enter password"
      ></ion-input>
    </ion-item>

    <ion-item lines="none" class="field-row">
      <ion-input
        class="freshi-input"
        type="password"
        label="Confirm Password"
        [formControl]="registration.controls.passwordsGroup.controls.pconfirm"
        labelPlacement="stacked"
        fill="outline"
        placeholder="Confirm password"
      ></ion-input>
    </ion-item>

    <ion-button
      (click)="submitRegistration()"
      [disabled]="registration.invalid"
    >
      Submit
    </ion-button>
  </ion-list>
</form>
