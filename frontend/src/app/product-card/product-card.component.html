<ion-card class="itemcard">
  <ion-card-header>
    <ion-card-title>{{ product()?.productName }}</ion-card-title>
    <ion-card-subtitle
      >{{ product()?.brand }} • {{ product()?.category }}</ion-card-subtitle
    >
  </ion-card-header>

  <ion-card-content>
    <div class="expiration-status">
      <ion-chip [color]="getColor()"
        ><ion-icon [name]="getIcon()"></ion-icon>
        @if (lifeLeft() === 0) {
          <span> Today </span>
        } @else if (lifeLeft() < 0) {
          <span> Expired </span>
        } @else {
          <span>{{ lifeLeft() }} days left</span>
        }
      </ion-chip>
      <span>{{ expirationDate() }}</span>
    </div>
  </ion-card-content>
</ion-card>
