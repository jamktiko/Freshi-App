<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons class="back" slot="start">
      <ion-button (click)="cancel()"
        ><ion-icon name="arrow-back"></ion-icon
      ></ion-button>
    </ion-buttons>
    <b>Product details</b>
  </ion-toolbar>
</ion-header>
<ion-content>
  <div class="details-container">
    <div class="product-photo">
      @if (photoWebPath()) {
        <div><ion-img [src]="photoWebPath()"> </ion-img></div>
      } @else {
        <div><ion-img [src]="testPhotoPath"> </ion-img></div>
      }
    </div>

    <div class="productdetails">
      <ion-list>
        <ion-item lines="none">
          <ion-label>
            <ion-note>Product name</ion-note>
            <h2>{{ productName }}</h2>
          </ion-label>
        </ion-item>
        <ion-item lines="none">
          <ion-label>
            <ion-note>Brand</ion-note>
            <h2>{{ productBrand }}</h2>
          </ion-label>
        </ion-item>
        <ion-item lines="none">
          <ion-label>
            <ion-note>Expiration date</ion-note>
            <h2>{{ expirationDate }}</h2>
          </ion-label>
        </ion-item>
        <ion-item lines="none">
          <ion-label>
            <ion-note>Category</ion-note>
            <h2>{{ productCategory }}</h2>
          </ion-label>
        </ion-item>
      </ion-list>
    </div>
  </div>

  <div class="buttons">
    <ion-button> Edit item </ion-button>
    <ion-button color="danger"> Delete item</ion-button>
  </div>
</ion-content>
