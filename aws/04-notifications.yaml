AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kodin ruokatarvikkeiden ylläpitosovellus - Notifications (EventBridge, Lambda, Secrets Manager)'

Parameters:
  DataStackName:
    Type: String
    Description: Name of the Data & Storage stack to import DynamoDB and S3 outputs from.
    Default: FoodAppDataStack

Resources:
  FirebaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: freshi/firebase-service-account
      Description: "Firebase service account JSON for FCM"
      SecretString: '{"type":"service_account","project_id":"update-this-in-console"}'

  NotificationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: NotificationPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - Fn::ImportValue: !Sub '${DataStackName}-DynamoDBTableArn'
                  - Fn::Sub:
                      - '${TableArn}/index/NotificationQueryIndex'
                      - TableArn:
                          Fn::ImportValue: !Sub '${DataStackName}-DynamoDBTableArn'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - Fn::ImportValue: !Sub '${DataStackName}-UserDevicesTableArn'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref FirebaseSecret

  NotificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: FreshiNotificationSender
      Runtime: nodejs20.x
      Role: !GetAtt NotificationLambdaRole.Arn
      Handler: index.handler
      Timeout: 30
      Environment:
        Variables:
          PRODUCTS_TABLE:
            Fn::ImportValue: !Sub '${DataStackName}-DynamoDBTableName'
          DEVICES_TABLE:
            Fn::ImportValue: !Sub '${DataStackName}-UserDevicesTableName'
          SECRET_NAME: !Ref FirebaseSecret
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log("Firebase Notification Lambda triggered via EventBridge!");
            console.log("This is an infrastructure placeholder. Deploy actual firebase-admin logic via CI/CD!");
            return { statusCode: 200, body: 'Success' };
          };

  DailyNotificationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: DailyFirebaseNotificationTrigger
      Description: "Triggers the notification Lambda daily at 9 AM Helsinki time (6 AM UTC)"
      ScheduleExpression: "cron(0 6 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt NotificationLambda.Arn
          Id: "TargetFunctionV1"

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NotificationLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyNotificationRule.Arn
